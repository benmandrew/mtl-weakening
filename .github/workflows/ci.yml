name: CI

on: [push, pull_request]

jobs:
  fmt:
    name: Format Check (black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install black
        run: |
          python -m pip install --upgrade pip
          pip install -c dev-requirements.txt black

      - name: Run black (check only)
        run: make fmt-ci

  ruff:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Run ruff
        run: make ruff

  pylint:
    name: Lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Run pylint
        run: make pylint

  mypy:
    name: Lint (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Run mypy
        run: make mypy

  bandit:
    name: Security Check (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install -c dev-requirements.txt bandit

      - name: Run bandit
        run: make bandit

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: Build documentation
        run: make docs

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [fmt, ruff, pylint, mypy, bandit]
    env:
      # Prevent line-wrapping in expect test
      COLUMNS: 200
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          sudo apt-get update && sudo apt-get install -y expect

      - name: Run unittest
        run: |
          make unittest

      - name: Run expect tests
        run: |
          make expect_test

  docker:
    name: Push Docker Image (${{ matrix.name }})
    needs: [test]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
            tag_suffix: linux-amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag_suffix: linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cegiw:${{ matrix.tag_suffix }}

  docker-manifest:
    name: Push Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create multi-arch latest tag
        run: |
          docker buildx imagetools create \
            --tag "${{ secrets.DOCKERHUB_USERNAME }}/cegiw:latest" \
            "${{ secrets.DOCKERHUB_USERNAME }}/cegiw:linux-amd64" \
            "${{ secrets.DOCKERHUB_USERNAME }}/cegiw:linux-arm64"
